<div class="title">監視翻訳</div><br>&nbsp;動画やゲームを表示した画面上で、範囲を指定して、&nbsp;&nbsp;<br>
&nbsp;その部分で変化していくテキストを連続的に翻訳します。&nbsp;&nbsp;<br>
&nbsp;&nbsp;&nbsp;<img alt="" src="images/image131.png" width="661" height="414"><br>
&nbsp;&nbsp;&nbsp;<br>
&nbsp;メイン画面&nbsp;&nbsp;<br>
&nbsp;&nbsp;&nbsp;<img alt="" src="images/image132.png" width="475" height="176"><br>
&nbsp;&nbsp;&nbsp;<br>
&nbsp;①&nbsp;&nbsp;監視翻訳を開始／停止します。(CTRL+SHIFT+F2)<br>
&nbsp;&nbsp;&nbsp;フレーム画面の枠内のテキストを読み込み、翻訳を行います。<br>
&nbsp;②&nbsp;&nbsp;監視翻訳ログ画面を表示します。<br>
&nbsp;&nbsp;&nbsp;<img alt="" src="images/image133.png" width="366" height="129"><br>
&nbsp;&nbsp;&nbsp;<br>
&nbsp;メニュー＞設定＞翻訳後に読上げ&nbsp;&nbsp;<br>
&nbsp;&nbsp;読上げをON／OFFします。&nbsp;<br>
&nbsp;&nbsp;&nbsp;<br>
&nbsp;メニュー＞設定＞監視翻訳&nbsp;&nbsp;<br>
&nbsp;&nbsp;監視翻訳についての設定を行います。&nbsp;<br>
